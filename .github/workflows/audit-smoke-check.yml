name: Audit Smoke Check

on:
  push:
    branches:
      - audit/phase-1-runtime-blockers
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit-smoke-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run audit smoke check
        run: python scripts/audit_smoke_check.py
